<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rebo - reading service</title>
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("rebo-theme");
          const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", savedTheme || systemTheme);
        } catch (_error) {
          const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", systemTheme);
        }
      })();
    </script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="/theme.css?v=20260324-3" />
    <link rel="stylesheet" href="/style.css?v=20260324-3" />
  </head>
  <body>
    <div class="layout-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <p class="brand-eyebrow">reading archive</p>
          <p class="brand-logo">rebo</p>
          <p class="brand-domain">rebo.com</p>
        </div>

        <nav class="side-nav">
          <button class="nav-item active" data-view="shelf" type="button"><span class="nav-icon" aria-hidden="true">📚</span><span class="nav-label">책장</span></button>
          <button class="nav-item" data-view="search" type="button"><span class="nav-icon" aria-hidden="true">⌕</span><span class="nav-label">검색</span></button>
          <button class="nav-item" data-view="stats" type="button"><span class="nav-icon" aria-hidden="true">▥</span><span class="nav-label">통계</span></button>
          <button class="nav-item" data-view="friends" type="button"><span class="nav-icon" aria-hidden="true">◔◡◔</span><span class="nav-label">친구</span></button>
          <button class="nav-item" data-view="my" type="button"><span class="nav-icon" aria-hidden="true">◉</span><span class="nav-label">MY</span></button>
        </nav>
      </aside>

      <div class="main-shell">
        <header class="topbar">
          <div>
            <h1 id="view-title" class="view-title">책장</h1>
            <p id="view-subtitle" class="view-subtitle"></p>
          </div>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="테마 전환"></button>
        </header>

        <main id="view" class="view"></main>
      </div>
    </div>

    <nav class="mobile-nav">
      <button class="nav-item active" data-view="shelf" type="button"><span class="nav-icon" aria-hidden="true">📚</span><span class="nav-label">책장</span></button>
      <button class="nav-item" data-view="search" type="button"><span class="nav-icon" aria-hidden="true">⌕</span><span class="nav-label">검색</span></button>
      <button class="nav-item" data-view="stats" type="button"><span class="nav-icon" aria-hidden="true">▥</span><span class="nav-label">통계</span></button>
      <button class="nav-item" data-view="friends" type="button"><span class="nav-icon" aria-hidden="true">◔◡◔</span><span class="nav-label">친구</span></button>
      <button class="nav-item" data-view="my" type="button"><span class="nav-icon" aria-hidden="true">◉</span><span class="nav-label">MY</span></button>
    </nav>

    <input id="cover-file-input" type="file" accept="image/*" capture="environment" hidden />

    <div id="sheet-root"></div>
    <div id="modal-root"></div>
    <div id="toast-root"></div>

    <script src="/app.js?v=20260324-3"></script>
  </body>
</html>
