<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rebo - reading service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="/style.css?v=20260307-2" />
  </head>
  <body data-theme="light">
    <div class="layout">
      <aside class="sidebar">
        <div class="logo-wrap">
          <p class="logo">rebo</p>
          <p class="domain">rebo.com</p>
        </div>
        <nav class="side-nav" id="side-nav">
          <button class="nav-item active" data-view="shelf">책장</button>
          <button class="nav-item" data-view="search">검색</button>
          <button class="nav-item" data-view="stats">통계</button>
          <button class="nav-item" data-view="my">MY</button>
        </nav>
      </aside>

      <div class="main-wrap">
        <header class="topbar">
          <div>
            <h1 id="view-title" class="view-title">책장</h1>
            <p id="view-subtitle" class="view-subtitle">내가 저장한 책을 한눈에 확인하세요.</p>
          </div>
        </header>
        <main id="view" class="view"></main>
      </div>
    </div>

    <nav class="mobile-nav" id="mobile-nav">
      <button class="nav-item active" data-view="shelf">책장</button>
      <button class="nav-item" data-view="search">검색</button>
      <button class="nav-item" data-view="stats">통계</button>
      <button class="nav-item" data-view="my">MY</button>
    </nav>

    <div id="modal-root"></div>
    <div id="toast-root"></div>

    <script src="/app.js?v=20260307-2"></script>
  </body>
</html>
